<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuperar contraseña | SAMA Ltda.</title>

<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/recovery.css">

<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

</head>

<body>

<header class="header">

<div class="logo">
<span class="material-symbols-outlined">science</span>
<h2>SAMA Ltda.</h2>
</div>

<button class="icon-btn">
<span class="material-symbols-outlined">help</span>
</button>

</header>

<main class="main center">

<div class="card small">

<div class="card-header">

<div class="icon-circle">
<span class="material-symbols-outlined">lock_reset</span>
</div>

<h1>¿Olvidaste tu contraseña?</h1>
<p>Ingresa tu correo para recibir un enlace de recuperación</p>

</div>

<form class="form">

<div class="form-group">

<label for="email">Correo electrónico</label>

<div class="input-icon">
<span class="material-symbols-outlined">mail</span>
<input id="email" type="email" placeholder="nombre@empresa.com" required>
</div>

</div>

<button class="btn" type="submit">
Enviar enlace de recuperación
</button>

</form>

<div class="card-footer">

<a href="login.html" class="link">
<span class="material-symbols-outlined">arrow_back</span>
Volver al login
</a>

</div>

</div>

</main>

<footer class="footer">
<p>© 2026 SAMA Ltda. | Todos los derechos reservados</p>
</footer>

</body>
</html>
